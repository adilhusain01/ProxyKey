services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: proxykey
      POSTGRES_PASSWORD: proxykey
      POSTGRES_DB: proxykey
    ports:
      - "5432:5432"
    volumes:
      - proxykey-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxykey -d proxykey"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  proxykey-postgres:
